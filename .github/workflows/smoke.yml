name: smoke
on:
  push:
    branches: [main, deluge]
  pull_request:
    branches: [main]
jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: cd BTC_Prediction && python -m pytest tests/test_smoke_imports.py -q
